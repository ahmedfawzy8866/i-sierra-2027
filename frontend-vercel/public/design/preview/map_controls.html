<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sierra Estates — Map Controls</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A1628; color: #F4F0E8; font-family: 'Inter', sans-serif; padding: 32px; }
    .map-demo {
      width: 100%;
      height: 400px;
      background: linear-gradient(135deg, rgba(14,29,53,0.4), rgba(10,22,40,0.6));
      border: 1px solid rgba(201,162,77,0.15);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      margin-bottom: 40px;
    }
    .control-group {
      position: absolute;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,162,77,0.15);
      border-radius: 8px;
      backdrop-filter: blur(20px);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .control-top-left { top: 16px; left: 16px; }
    .control-top-right { top: 16px; right: 16px; }
    .control-bottom-left { bottom: 16px; left: 16px; }
    .control-bottom-right { bottom: 16px; right: 16px; }
    .control-btn {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,162,77,0.15);
      border-radius: 6px;
      color: #F4F0E8;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease-out;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .control-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(201,162,77,0.25);
      color: #C9A24D;
    }
    .control-btn.active {
      background: #C9A24D;
      color: #0A1628;
      border-color: #C9A24D;
    }
    .search-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,162,77,0.15);
      border-radius: 8px;
      padding: 10px 12px;
      color: #F4F0E8;
      font-size: 12px;
      width: 200px;
    }
    .search-input::placeholder {
      color: rgba(244,240,232,0.3);
    }
    .search-input:focus {
      outline: none;
      border-color: rgba(201,162,77,0.4);
      background: rgba(255,255,255,0.06);
    }
    .legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,162,77,0.15);
      border-radius: 8px;
      backdrop-filter: blur(20px);
      padding: 12px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 10px;
    }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }
    .section { margin-bottom: 40px; }
    .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; margin-bottom: 16px; }
    .controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
    }
    .control-demo {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,162,77,0.15);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .control-demo-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .control-demo-label {
      font-size: 10px;
      color: rgba(244,240,232,0.6);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .toggle-group {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,162,77,0.15);
      border-radius: 6px;
      padding: 4px;
    }
    .toggle-btn {
      flex: 1;
      padding: 8px 12px;
      background: transparent;
      border: none;
      color: rgba(244,240,232,0.5);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .toggle-btn.active {
      background: #C9A24D;
      color: #0A1628;
    }
  </style>
</head>
<body>
  <!-- Map Demo with Controls -->
  <div class="map-demo">
    <!-- Top Left: Zoom Controls -->
    <div class="control-group control-top-left">
      <button class="control-btn" title="Zoom In">+</button>
      <button class="control-btn" title="Zoom Out">−</button>
    </div>

    <!-- Top Right: Search -->
    <div class="control-group control-top-right" style="flex-direction: row; width: auto; padding: 4px;">
      <input type="text" class="search-input" placeholder="Search zone...">
    </div>

    <!-- Bottom Left: Legend -->
    <div class="legend">
      <div class="legend-item">
        <div class="legend-color" style="background: rgba(34, 197, 94, 0.6);"></div>
        <span>Available (312 units)</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background: rgba(251, 191, 36, 0.6);"></div>
        <span>Limited (198 units)</span>
      </div>
      <div class="legend-item">
        <div class="legend-color" style="background: rgba(14, 165, 233, 0.6);"></div>
        <span>Launching (156 units)</span>
      </div>
    </div>

    <!-- Bottom Right: Layer Toggle -->
    <div class="control-group control-bottom-right">
      <button class="control-btn active" title="Satellite View">🛰</button>
      <button class="control-btn" title="Street View">🗺</button>
      <button class="control-btn" title="Zones">⬜</button>
    </div>
  </div>

  <!-- Control Types -->
  <div class="section">
    <div class="section-title">Navigation Controls</div>
    <div class="controls-grid">
      <div class="control-demo">
        <div class="control-demo-icon">+</div>
        <div class="control-demo-label">Zoom In</div>
      </div>
      <div class="control-demo">
        <div class="control-demo-icon">−</div>
        <div class="control-demo-label">Zoom Out</div>
      </div>
      <div class="control-demo">
        <div class="control-demo-icon">⟲</div>
        <div class="control-demo-label">Reset</div>
      </div>
      <div class="control-demo">
        <div class="control-demo-icon">📍</div>
        <div class="control-demo-label">Locate Me</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">View Modes</div>
    <div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(201,162,77,0.15); border-radius: 12px; padding: 20px;">
      <div class="toggle-group" style="max-width: 300px;">
        <button class="toggle-btn active">Map</button>
        <button class="toggle-btn">Satellite</button>
        <button class="toggle-btn">Hybrid</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Zone Filtering</div>
    <div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(201,162,77,0.15); border-radius: 12px; padding: 20px; display: flex; gap: 8px; flex-wrap: wrap;">
      <button class="control-btn active" style="width: auto; padding: 6px 12px;">All</button>
      <button class="control-btn" style="width: auto; padding: 6px 12px;">Available</button>
      <button class="control-btn" style="width: auto; padding: 6px 12px;">Limited</button>
      <button class="control-btn" style="width: auto; padding: 6px 12px;">Launching</button>
    </div>
  </div>
</body>
</html>

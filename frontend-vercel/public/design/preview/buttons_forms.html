<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sierra Estates — Buttons & Forms</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A1628; color: #F4F0E8; font-family: 'Inter', sans-serif; padding: 32px; }
    .group { margin-bottom: 32px; }
    .group-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; margin-bottom: 16px; }
    .btn { padding: 12px 16px; border-radius: 8px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: all 0.2s ease-out; }
    .btn-primary { background: #C9A24D; color: #0A1628; }
    .btn-primary:hover { background: #B8912F; box-shadow: 0 0 24px rgba(201,162,77,0.15); }
    .btn-secondary { background: rgba(255,255,255,0.04); border: 1px solid rgba(201,162,77,0.2); color: #C9A24D; }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); border-color: rgba(201,162,77,0.4); }
    .btn-tertiary { background: transparent; border: none; color: #C9A24D; padding: 8px 0; }
    .btn-tertiary:hover { color: #B8912F; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .label { display: block; font-size: 9px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; opacity: 0.5; margin-bottom: 8px; }
    input, select, textarea { width: 100%; padding: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; color: #F4F0E8; font-family: 'Inter', sans-serif; font-size: 14px; transition: all 0.2s ease-out; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: rgba(201,162,77,0.4); background: rgba(255,255,255,0.06); }
    input::placeholder { color: rgba(244,240,232,0.4); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; }
    .badge-gold { background: linear-gradient(135deg, #C9A24D, #B8912F); color: #0A1628; }
    .badge-success { background: #22C55E; color: #0A1628; }
    .badge-warning { background: #FBBF24; color: #0A1628; }
  </style>
</head>
<body>
  <div class="group">
    <div class="group-title">Button States</div>
    <div class="btn-group">
      <button class="btn btn-primary">Primary Default</button>
      <button class="btn btn-primary" style="background: #B8912F;">Primary Hover</button>
      <button class="btn btn-primary" style="background: #A07A24;">Primary Active</button>
      <button class="btn btn-primary" style="background: rgba(201,162,77,0.3); cursor: not-allowed;">Primary Disabled</button>
    </div>
  </div>

  <div class="group">
    <div class="group-title">Secondary Buttons</div>
    <div class="btn-group">
      <button class="btn btn-secondary">Secondary</button>
      <button class="btn btn-secondary" style="background: rgba(255,255,255,0.08); border-color: rgba(201,162,77,0.4);">Hover</button>
      <button class="btn btn-tertiary">Tertiary Link</button>
    </div>
  </div>

  <div class="group">
    <div class="group-title">Form Inputs</div>
    <div class="form-group">
      <label class="label">Property Type</label>
      <select>
        <option value="">Select property type...</option>
        <option value="apartment">Apartment</option>
        <option value="villa">Villa</option>
        <option value="penthouse">Penthouse</option>
      </select>
    </div>
    <div class="form-group">
      <label class="label">Email Address</label>
      <input type="email" placeholder="Enter your email...">
    </div>
    <div class="form-group">
      <label class="label">Message</label>
      <textarea placeholder="Enter your message..." rows="3"></textarea>
    </div>
  </div>

  <div class="group">
    <div class="group-title">Badges</div>
    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
      <span class="badge badge-gold">HIGH VALUE</span>
      <span class="badge badge-success">Available</span>
      <span class="badge badge-warning">Limited</span>
      <span class="badge" style="background: #0EA5E9; color: white;">Launching</span>
    </div>
  </div>
</body>
</html>

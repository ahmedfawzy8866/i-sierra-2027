<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sierra Estates — Payment Filters</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A1628; color: #F4F0E8; font-family: 'Inter', sans-serif; padding: 32px; }
    .section { margin-bottom: 40px; }
    .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; margin-bottom: 16px; }
    .filter-group { 
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,162,77,0.15);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(20px);
      margin-bottom: 16px;
    }
    .filter-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em;
      color: rgba(244,240,232,0.4);
      margin-bottom: 12px; display: block;
    }
    .filter-options {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px;
    }
    .filter-btn {
      padding: 8px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,162,77,0.15);
      border-radius: 6px;
      color: rgba(244,240,232,0.6);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s ease-out;
    }
    .filter-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(201,162,77,0.25);
      color: #F4F0E8;
    }
    .filter-btn.active {
      background: #C9A24D;
      color: #0A1628;
      border-color: #C9A24D;
      font-weight: 600;
      box-shadow: 0 0 16px rgba(201,162,77,0.2);
    }
    .range-slider {
      width: 100%;
      margin-top: 12px;
    }
    .range-input {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, rgba(201,162,77,0.3), rgba(201,162,77,0.3));
      outline: none;
      -webkit-appearance: none;
    }
    .range-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #C9A24D;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(201,162,77,0.3);
    }
    .range-input::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #C9A24D;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(201,162,77,0.3);
    }
    .range-values {
      display: flex; justify-content: space-between; margin-top: 8px;
      font-size: 11px; color: rgba(244,240,232,0.5);
    }
    .payment-method {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    }
    .payment-card {
      padding: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,162,77,0.15);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease-out;
      text-align: center;
    }
    .payment-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(201,162,77,0.25);
    }
    .payment-card.selected {
      background: rgba(201,162,77,0.1);
      border-color: #C9A24D;
    }
    .payment-icon {
      font-size: 20px; margin-bottom: 6px;
    }
    .payment-name {
      font-size: 11px; font-weight: 500; color: #F4F0E8;
    }
    .checkbox-group {
      display: flex; flex-direction: column; gap: 10px;
    }
    .checkbox-item {
      display: flex; align-items: center; gap: 10px;
    }
    .checkbox {
      width: 16px;
      height: 16px;
      border: 1px solid rgba(201,162,77,0.25);
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      transition: all 0.2s;
    }
    .checkbox:hover {
      border-color: rgba(201,162,77,0.4);
    }
    .checkbox.checked {
      background: #C9A24D;
      border-color: #C9A24D;
    }
    .checkbox-label {
      font-size: 12px; cursor: pointer; flex: 1;
    }
    .filter-actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px;
    }
    .btn {
      padding: 10px; border-radius: 8px; font-weight: 600; font-size: 12px;
      border: none; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary {
      background: #C9A24D; color: #0A1628;
    }
    .btn-primary:hover {
      background: #B8912F; box-shadow: 0 0 16px rgba(201,162,77,0.2);
    }
    .btn-secondary {
      background: transparent; border: 1px solid rgba(201,162,77,0.2);
      color: rgba(244,240,232,0.6);
    }
    .btn-secondary:hover {
      border-color: rgba(201,162,77,0.4); color: #F4F0E8;
    }
  </style>
</head>
<body>
  <div class="section">
    <div class="section-title">Payment Schedule</div>
    <div class="filter-group">
      <label class="filter-label">Rent Payment Terms</label>
      <div class="filter-options">
        <button class="filter-btn active">Monthly</button>
        <button class="filter-btn">Quarterly</button>
        <button class="filter-btn">Semi-Annual</button>
        <button class="filter-btn">Annual</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Price Range Slider</div>
    <div class="filter-group">
      <label class="filter-label">Monthly Rent (EGP)</label>
      <input type="range" class="range-slider range-input" min="500" max="10000" value="5000">
      <div class="range-values">
        <span>500 EGP</span>
        <span>10,000 EGP</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Payment Methods</div>
    <div class="filter-group">
      <label class="filter-label">Accepted Methods</label>
      <div class="payment-method">
        <div class="payment-card selected">
          <div class="payment-icon">💳</div>
          <div class="payment-name">Card</div>
        </div>
        <div class="payment-card">
          <div class="payment-icon">🏦</div>
          <div class="payment-name">Bank</div>
        </div>
        <div class="payment-card">
          <div class="payment-icon">💰</div>
          <div class="payment-name">Cash</div>
        </div>
        <div class="payment-card">
          <div class="payment-icon">📱</div>
          <div class="payment-name">Mobile</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Additional Filters</div>
    <div class="filter-group">
      <label class="filter-label">Filter Options</label>
      <div class="checkbox-group">
        <div class="checkbox-item">
          <div class="checkbox checked"></div>
          <label class="checkbox-label">Available Immediately</label>
        </div>
        <div class="checkbox-item">
          <div class="checkbox"></div>
          <label class="checkbox-label">Flexible Move-in Date</label>
        </div>
        <div class="checkbox-item">
          <div class="checkbox"></div>
          <label class="checkbox-label">Long-term Lease Only</label>
        </div>
        <div class="checkbox-item">
          <div class="checkbox"></div>
          <label class="checkbox-label">Negotiable Price</label>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="filter-group">
      <div class="filter-actions">
        <button class="btn btn-secondary">Reset Filters</button>
        <button class="btn btn-primary">Apply Filters</button>
      </div>
    </div>
  </div>
</body>
</html>
